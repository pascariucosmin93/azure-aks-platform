name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    name: Apply (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      ENV_DIR: envs/${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Prepare backend config
        working-directory: ${{ env.ENV_DIR }}
        run: |
          cat > backend.hcl <<EOF
          resource_group_name  = "${{ secrets.TFSTATE_RESOURCE_GROUP }}"
          storage_account_name = "${{ secrets.TFSTATE_STORAGE_ACCOUNT }}"
          container_name       = "${{ secrets.TFSTATE_CONTAINER }}"
          key                  = "${{ secrets.TFSTATE_KEY }}"
          use_azuread_auth     = true
          EOF

      - name: terraform init
        working-directory: ${{ env.ENV_DIR }}
        run: terraform init -backend-config=backend.hcl

      # Plan immediately before apply — ensures apply uses the current state,
      # not a plan artifact that may be stale from an earlier PR review.
      - name: terraform plan
        working-directory: ${{ env.ENV_DIR }}
        run: terraform plan -var-file=terraform.tfvars -out=tfplan -detailed-exitcode

      - name: terraform apply
        working-directory: ${{ env.ENV_DIR }}
        run: terraform apply -auto-approve tfplan
