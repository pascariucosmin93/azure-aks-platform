name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: Prepare backend config
        working-directory: envs/${{ inputs.environment }}
        run: |
          cat > backend.hcl <<EOF
          resource_group_name  = "${{ secrets.TFSTATE_RESOURCE_GROUP }}"
          storage_account_name = "${{ secrets.TFSTATE_STORAGE_ACCOUNT }}"
          container_name       = "${{ secrets.TFSTATE_CONTAINER }}"
          key                  = "${{ secrets.TFSTATE_KEY }}"
          use_azuread_auth     = true
          EOF

      - name: Terraform init
        working-directory: envs/${{ inputs.environment }}
        run: terraform init -backend-config=backend.hcl

      - name: Terraform apply
        working-directory: envs/${{ inputs.environment }}
        run: terraform apply -var-file=terraform.tfvars -auto-approve
