name: Terraform Validate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: terraform fmt
        run: terraform fmt -check -recursive

  validate:
    name: Validate (${{ matrix.env_dir }})
    runs-on: ubuntu-latest
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        env_dir:
          - envs/dev
          - envs/prod
          - examples/minimal

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2

      - name: terraform init
        working-directory: ${{ matrix.env_dir }}
        run: terraform init -backend=false

      - name: terraform validate
        working-directory: ${{ matrix.env_dir }}
        run: terraform validate

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Init TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive

  checkov:
    name: Checkov security scan
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4

      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          config_file: .checkov.yaml
          quiet: true
          output_format: cli
